# Application Name
spring.application.name=mrkBikeTraining

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/mrktraining
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# ddl-auto=validate  – lets schema.sql own the DDL; Hibernate only validates on startup
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:db/postgres/schema.sql

# WebClient Configuration
spring.webflux.base-path=/api
logging.level.org.springframework.web.reactive.function.client=DEBUG

# OpenAPI / Swagger Logging
logging.level.org.springdoc=DEBUG

#Agent Configuration
spring.ai.openai.base-url=${ai.google.base-url}
spring.ai.openai.api-key=${ai.google.api-key}
spring.ai.openai.chat.options.model=${ai.google.model}
spring.ai.openai.chat.options.temperature=0.7

# JWT (override via JWT_SECRET env var in production)
app.jwt.secret=${JWT_SECRET:mrk-bike-training-dev-secret-change-in-production-min-32-chars}
app.jwt.expiration-ms=86400000

# Password Hashing Secret (override via PASSWORD_SECRET env var in production)
app.password.secret=${PASSWORD_SECRET:mrk-bike-training-password-secret-change-in-production-min-32-chars}

# OpenAPI / Swagger — prevent 500 on schema generation errors
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.writer-with-default-pretty-printer=true
# Ignore schema generation failures for individual types instead of returning 500
springdoc.swagger-ui.disable-swagger-default-url=true