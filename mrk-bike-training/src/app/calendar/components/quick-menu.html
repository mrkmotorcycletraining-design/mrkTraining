@if (menuState(); as menu) {
  <!-- Transparent overlay to intercept click-outside and dismiss menu -->
  <div class="quick-menu-overlay" (click)="closeMenu()" (contextmenu)="$event.preventDefault(); closeMenu()"></div>
  
  <div 
    class="quick-menu-container" 
    [ngStyle]="getMenuStyles()"
    (contextmenu)="$event.preventDefault()"
  >
    @if (menu.event; as ev) {
      <!-- Context menu for existing events -->
      <div class="menu-header">Task Options</div>
      
      <button type="button" class="menu-item" (click)="viewEvent()">
        <span>👁️ View Details</span>
      </button>
      
      <button type="button" class="menu-item" (click)="editEvent()">
        <span>✏️ Edit Schedule</span>
      </button>
      
      <div class="menu-divider"></div>
      
      <button type="button" class="menu-item delete-item" (click)="deleteEvent()">
        <span>🗑️ Delete Schedule</span>
      </button>
    } @else {
      <!-- Context menu for empty day/time slot -->
      <button type="button" class="menu-item create-item" (click)="triggerFullCreate()">
        <span>➕ Add New Schedule</span>
      </button>
    }
  </div>
}
