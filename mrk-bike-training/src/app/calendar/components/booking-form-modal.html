<div class="modal-overlay" (click)="close()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ isEdit ? 'Edit Booking' : 'New Schedule Task' }}</h3>
      <button type="button" class="close-btn" (click)="close()">&times;</button>
    </div>

    @if (bookingForm) {
      <form [formGroup]="bookingForm" (ngSubmit)="onSubmit()">
        <!-- Title Input -->
        <div class="form-group">
          <label for="title">Title / Activity</label>
          <input 
            type="text" 
            id="title" 
            formControlName="title" 
            placeholder="e.g. Demo Ride, Maintenance..."
          />
        </div>

        <!-- Vehicle Target Selector -->
        <div class="form-group">
          <label for="resourceId">Assign Vehicle</label>
          <select id="resourceId" formControlName="resourceId">
            <option value="" disabled>-- Select Vehicle --</option>
            @for (res of selectableResources(); track res.id) {
              <option [value]="res.id">{{ res.name }}</option>
            }
          </select>
        </div>

        <!-- Date Picker -->
        <div class="form-group">
          <label for="date">Schedule Date</label>
          <input type="date" id="date" formControlName="date" />
        </div>

        <!-- Start & End Time Pickers -->
        <div class="form-row">
          <div class="form-group">
            <label for="startTime">Start Time</label>
            <input type="time" id="startTime" formControlName="startTime" />
          </div>
          <div class="form-group">
            <label for="endTime">End Time</label>
            <input type="time" id="endTime" formControlName="endTime" />
          </div>
        </div>

        <!-- Status Select -->
        <div class="form-group">
          <label for="status">Operational Status</label>
          <select id="status" formControlName="status">
            <option value="CONFIRMED">CONFIRMED</option>
            <option value="PENDING">PENDING</option>
            <option value="CANCELLED">CANCELLED</option>
          </select>
        </div>

        <!-- Render Dynamic Metadata Fields Configured by Parent -->
        @for (field of metadataFields; track field.key) {
          <div class="form-group">
            <label [for]="field.key">{{ field.label }}</label>
            
            @if (field.type === 'select') {
              <select [id]="field.key" [formControlName]="field.key">
                <option value="">-- Select Option --</option>
                @for (opt of field.options; track opt.value) {
                  <option [value]="opt.value">{{ opt.label }}</option>
                }
              </select>
            } @else {
              <input 
                type="text" 
                [id]="field.key" 
                [formControlName]="field.key"
                [placeholder]="'Enter ' + field.label"
              />
            }
          </div>
        }

        <!-- Internal Notes Textarea -->
        <div class="form-group">
          <label for="notes">Notes / Instructions</label>
          <textarea 
            id="notes" 
            formControlName="notes" 
            placeholder="Add special instructions or comments..."
          ></textarea>
        </div>

        <!-- Actions -->
        <div class="modal-actions">
          <button type="button" class="cancel-btn" (click)="close()">Cancel</button>
          <button 
            type="submit" 
            class="submit-btn" 
            [disabled]="bookingForm.invalid"
          >
            {{ isEdit ? 'Save Changes' : 'Create Task' }}
          </button>
        </div>
      </form>
    }
  </div>
</div>
