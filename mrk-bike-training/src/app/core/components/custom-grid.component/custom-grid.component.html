<div class="grid-container">
  <ag-grid-angular
    style="width: 100%; height: 100%;"
    class="ag-theme-quartz" 
    [rowData]="rowData$ | async"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [pagination]="true"
      [paginationPageSize]="10"
    (gridReady)="onGridReady($event)">
  </ag-grid-angular>
</div>
